name: Unit Tests

on:
  push:
    branches: [main, npz-serializer]
  pull_request:
    branches: [main, npz-serializer]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.54.1

      - name: Run mock-based unit tests
        run: pixi run pytest tests/test_psana1_data_sources.py tests/test_psana2_data_sources.py -v
